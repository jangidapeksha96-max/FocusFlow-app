<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</button>
<body>
  <nav class="navbar">
  <div class="logo">
    <i class="fas fa-bolt"></i> FocusFlow
  </div>
  <div class="nav-icons">
    <i class="fas fa-home" title="Home"></i>
    <i class="fas fa-check-circle" title="Tasks"></i>
    <i class="fas fa-clock" title="Timer"></i>
    <i class="fas fa-chart-line" title="Stats"></i>
    <i class="fas fa-moon" id="themeIcon" onclick="toggleTheme()" title="Theme"></i>
  </div>
</nav>

<div class="container">

  <h1 class="Focus Flow">
  <i class="fas fa-bolt"></i> FocusFlow
</h1>

  <!-- Task Manager -->
  <div class="card">
    <h2>Tasks</h2>
    <input type="text" id="taskInput" placeholder="Add a task...">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
  </div>

  <!-- Pomodoro Timer -->
  <div id="timer" class="card">
  <h2 id="mode">Focus Time</h2>

  <div class="circle">
    <svg width="200" height="200">
      <circle cx="100" cy="100" r="90" class="bg"></circle>
      <circle cx="100" cy="100" r="90" class="progress" id="progressCircle"></circle>
    </svg>
    <div id="timerDisplay">25:00</div>
  </div>

  <button onclick="startTimer()">Start</button>
  <button onclick="resetTimer()">Reset</button>
  <button onclick="startBreak()">Break</button>
</div>

  <!-- Quotes -->
  <div class="card">
  <h2>Daily Motivation</h2>
  <p id="quote">Loading quote...</p>
</div>

</div>
<div class="card">
  <h2>Stats</h2>
  <p>Sessions Completed: <span id="sessions">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
